# Tiny FTP Server 配置文件
# 键值对格式: key = value
# 默认值注释在行末

port = 21              # 控制连接端口（需要root权限才能使用<1024的端口）
data_port_min = 30000  # PASV被动模式数据端口范围下限
data_port_max = 30010  # PASV被动模式数据端口范围上限
max_clients = 100      # 最大并发客户端数
max_login_fails = 3    # 最大登录失败次数
timeout = 300          # 空闲超时（秒）

listen_addr = 0.0.0.0  # 监听地址
root_dir = /srv/ftp    # FTP根目录
user_file = /etc/ftpd/users.conf  # 虚拟用户文件路径

welcome_msg = Welcome to Tiny FTP Server (RFC 959)
